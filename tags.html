<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAGS</title>
</head>
<body>
    <ol>
        <li>item1</li>
        <li>item2</li>
    </ol>
    <br><br>

    <ul>
        <li>item1</li>
        <li>item2</li>
    </ul>
    <br><br>
    <b>IMPORTANT TAGS</b>
    <br><br>
    <button>TAGS</button>
    <br><br>
    <p>THE ABOVE MENTIONED TAGS ARE <del>NOT</del> IMPORTANT</p>
    <br><br>
    <p>H<sub>2</sub>O</p>
    <br><br>
    <p>2<sup>3</sup>8</p>
    <br><br>
    <p>These are the <em>imporant</em> tags</p>
    <br><br>
    <table>
        <thead>
            <tr>
                <th>columm1</th>
                <th>column2</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>A</td>
            </tr>
            <tr>
                <td>2</td>
                <td>B</td>
            </tr>
            <tr>
                <td>3</td>
                <td>C</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
